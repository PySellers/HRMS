<!DOCTYPE html>
<html>
<head>
  <title>Change Password - PySellers HRMS</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f9; padding:40px; }
    .box { background:white; padding:20px; max-width:400px; margin:auto; border-radius:6px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    h2 { margin-top:0; }
    label { display:block; margin-top:10px; }
    input { width:95%; padding:8px; margin-top:5px; }
    .btn { margin-top:15px; padding:8px 15px; background:#3498db; color:white; border:none; border-radius:4px; cursor:pointer; }
    .btn:hover { background:#2980b9; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Change Password</h2>
    <form method="POST" action="/employee/change-password">
      <label>Old Password</label>
      <input type="password" name="old_password" required>

      <label>New Password</label>
      <input type="password" name="new_password" required>

      <label>Confirm New Password</label>
      <input type="password" name="confirm_password" required>

      <button type="submit" class="btn">Update Password</button>
    </form>
    <p><a href="/employee/dashboard">Back to Dashboard</a></p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HR Portal | Employee Details</title>
<link rel="icon" href="/static/images/pylogo.png">

<style>
:root{
  --primary:#2563eb;
  --secondary:#081a42;
  --accent:#00e0ff;
  --bg:#eef3ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Segoe UI,sans-serif;
  background:var(--bg);
}

header{
  padding:18px 40px;
  background:linear-gradient(90deg,var(--secondary),var(--primary));
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header a{color:#fff;text-decoration:none;font-weight:600}

.container{
  max-width:1200px;
  margin:30px auto;
  padding:0 20px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:26px;
  box-shadow:0 20px 40px rgba(0,0,0,.12);
  margin-bottom:26px;
}

.section-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:16px;
  color:#1e3a8a;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

label{
  font-size:13px;
  font-weight:600;
  display:block;
  margin-bottom:4px;
}

label span{color:red}

input,select{
  padding:12px 14px;
  border-radius:14px;
  border:1px solid #d6ddff;
  width:100%;
}

/* ===============================
   RESUME DROP ZONE
================================ */
.drop-zone{
  border:2px dashed #94a3b8;
  border-radius:16px;
  padding:26px;
  text-align:center;
  cursor:pointer;
  background:#f8fafc;
}

.drop-zone.dragover{
  background:#e0f2fe;
  border-color:#2563eb;
}

.resume-actions{
  margin-top:12px;
}

/* ===============================
   ACTION BUTTONS
================================ */
.actions{
  display:flex;
  justify-content:center;
  gap:18px;
}

button{
  padding:12px 28px;
  border-radius:999px;
  border:none;
  font-weight:600;
  cursor:pointer;
}
.btn{
  padding:14px 34px;
  border-radius:999px;
  font-weight:600;
  min-width:220px;
  display:inline-flex;
  justify-content:center;
  align-items:center;
}

.btn-save{
  border:none;
  background:linear-gradient(135deg,#2563eb,#00e0ff);
  color:#fff;
}

.btn-cancel{
  background:linear-gradient(135deg,#9ca3af,#6b7280);
  color:#fff;
  text-decoration:none;
}
.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;
}

.btn-secondary{
  background:#e5e7eb;
  text-decoration:none;
  color:#111;
}
</style>
</head>

<body>

<header>
  <strong>HR PORTAL · EMPLOYEE DETAILS</strong>
  <a href="/admin/employees">⬅ Back</a>
</header>

<div class="container">

<form method="POST"
      action="/admin/employeedetails/add"
      enctype="multipart/form-data">

<!-- ===============================
 PERSONAL DETAILS
================================ -->
<div class="card">
  <div class="section-title">👤 Personal Details</div>
  <div class="form-grid">

    <div>
      <label>Employee ID <span>*</span></label>
      <input name="employee_id"
             value="{{ .employee.EmployeeID }}"
             {{ if .employee.EmployeeID }}readonly{{ end }}
             required>
    </div>

    <div>
      <label>Full Name <span>*</span></label>
      <input name="full_name" value="{{ .employee.FullName }}" required>
    </div>

    <div>
      <label>Date of Birth</label>
      <input type="date" name="dob" value="{{ .employee.DateOfBirth }}">
    </div>

    <div>
      <label>Gender</label>
      <select name="gender">
        <option value="">Select</option>
        <option {{ if eq .employee.Gender "Male" }}selected{{ end }}>Male</option>
        <option {{ if eq .employee.Gender "Female" }}selected{{ end }}>Female</option>
        <option {{ if eq .employee.Gender "Other" }}selected{{ end }}>Other</option>
      </select>
    </div>

    <div>
      <label>Phone <span>*</span></label>
      <input name="phone" value="{{ .employee.Phone }}" required>
    </div>

    <div>
      <label>Email <span>*</span></label>
      <input type="email" name="email" value="{{ .employee.Email }}" required>
    </div>

    <div>
      <label>Address</label>
      <input name="address" value="{{ .employee.Address }}">
    </div>

  </div>
</div>

<!-- ===============================
 EMPLOYMENT DETAILS
================================ -->
<div class="card">
  <div class="section-title">💼 Employment Details</div>
  <div class="form-grid">

    <div>
      <label>Designation <span>*</span></label>
      <input name="designation" value="{{ .employee.Designation }}" required>
    </div>

    <div>
      <label>Department</label>
      <input name="department" value="{{ .employee.Department }}">
    </div>

    <div>
      <label>Date of Joining <span>*</span></label>
      <input type="date" name="doj" value="{{ .employee.DateOfJoining }}" required>
    </div>

    <div>
      <label>Employment Type</label>
      <select name="employment_type">
        <option {{ if eq .employee.EmploymentType "Full Time" }}selected{{ end }}>Full Time</option>
        <option {{ if eq .employee.EmploymentType "Part Time" }}selected{{ end }}>Part Time</option>
        <option {{ if eq .employee.EmploymentType "Intern" }}selected{{ end }}>Intern</option>
        <option {{ if eq .employee.EmploymentType "Contract" }}selected{{ end }}>Contract</option>
      </select>
    </div>

  </div>
</div>

<!-- ===============================
 GOVERNMENT IDS
================================ -->
<div class="card">
  <div class="section-title">🪪 Government IDs</div>
  <div class="form-grid">

    <div>
      <label>PAN Number <span>*</span></label>
      <input name="pan" value="{{ .employee.PAN }}" required>
    </div>

    <div>
      <label>Aadhaar Number</label>
      <input name="aadhaar" value="{{ .employee.Aadhaar }}">
    </div>

  </div>
</div>

<!-- ===============================
 BANK DETAILS
================================ -->
<div class="card">
  <div class="section-title">🏦 Bank Details</div>
  <div class="form-grid">

    <div>
      <label>Bank Name</label>
      <input name="bank_name" value="{{ .employee.BankName }}">
    </div>

    <div>
      <label>Account Number <span>*</span></label>
      <input name="account_number" value="{{ .employee.AccountNumber }}" required>
    </div>

    <div>
      <label>IFSC Code <span>*</span></label>
      <input name="ifsc" value="{{ .employee.IFSC }}" required>
    </div>

  </div>
</div>

<!-- ===============================
 EDUCATION & EXPERIENCE + RESUME
================================ -->
<div class="card">
  <div class="section-title">🎓 Education & Experience</div>

  <div class="form-grid">
    <div>
      <label>Highest Degree</label>
      <input name="degree" value="{{ .employee.Degree }}">
    </div>

    <div>
      <label>Total Experience (Years)</label>
      <input type="number" name="experience" value="{{ .employee.Experience }}">
    </div>
  </div>

  <div style="margin-top:16px">
    <label>Employee Resume (PDF / DOC, max 2MB)</label>

    <div class="drop-zone" id="dropZone">
      <span id="resumeText">
        📄 Drag & drop resume here or click to upload
      </span>
      <input type="file"
             name="resume"
             id="resumeInput"
             hidden
             accept=".pdf,.doc,.docx">
    </div>

    {{ if .employee.Resume }}
    <div class="resume-actions">
      <a href="/admin/employeedetails/resume/{{ .employee.EmployeeID }}"
         class="btn-secondary">
        📄 Download Resume
      </a>
    </div>
    {{ end }}
  </div>
</div>

<!-- ===============================
 ACTIONS
================================ -->
<a href="/admin/employees" class="btn btn-cancel">
  Cancel
</a>

<button type="submit" class="btn btn-save">
  Save Employee Details
</button>

</form>
</div>

<script>
const dz = document.getElementById("dropZone");
const fi = document.getElementById("resumeInput");
const txt = document.getElementById("resumeText");

dz.onclick = () => fi.click();

dz.ondragover = e => {
  e.preventDefault();
  dz.classList.add("dragover");
};

dz.ondragleave = () => dz.classList.remove("dragover");

dz.ondrop = e => {
  e.preventDefault();
  dz.classList.remove("dragover");
  fi.files = e.dataTransfer.files;
  if (fi.files.length > 0) {
    txt.innerText = "📄 " + fi.files[0].name;
  }
};

fi.onchange = () => {
  if (fi.files.length > 0) {
    txt.innerText = "📄 " + fi.files[0].name;
  }
};
</script>

</body>
</html>
